services:
  n8n:
    image: n8nio/n8n:2.1.1
    container_name: n8n
    restart: unless-stopped
    ports:
      - "5678:5678"
    env_file:
      - .env
    volumes:
      - n8n_data:/home/node/.n8n
    networks:
      - minha_rede

  postgres:
    image: ankane/pgvector
    container_name: postgres
    restart: unless-stopped
    ports:
      - "5432"
    env_file:
      - .env
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - minha_rede

  # PGADMIN CONSOME MAIS RECURSOS PORÉM COMPLETO
  # pgadmin:
  #   image: dpage/pgadmin4
  #   container_name: pgadmin
  #   restart: unless-stopped
  #   ports:
  #     - "8081:80"
  #   environment:
  #     PGADMIN_DEFAULT_EMAIL: seuemail@exemplo.com
  #     PGADMIN_DEFAULT_PASSWORD: suasenha
  #   depends_on:
  #     - postgres
  #   networks:
  #     - minha_rede

  evolution-api:
    container_name: lab_evolution_api
    image: evoapicloud/evolution-api:v2.3.6
    restart: always
    ports:
      - 8080:8080
    volumes:
      - lab_evolution_instances:/lab_evolution/instances
    env_file:
      - .env
    networks:
      - minha_rede

  zrok:
    image: openziti/zrok
    container_name: zrok
    restart: unless-stopped
    volumes:
      - ./.zrok:/home/ziggy/.zrok
    env_file:
      - .env
    command: share reserved ${ZROK_N8N_TOKEN} --headless
    networks:
      - minha_rede

  zrok-evolution:
    image: openziti/zrok
    container_name: zrok_evolution
    restart: unless-stopped
    volumes:
      - ./.zrok:/home/ziggy/.zrok
    env_file:
      - .env
    command: share reserved ${ZROK_EVOLUTION_TOKEN} --headless
    networks:
      - minha_rede

  redis:
    image: redis:alpine
    restart: always
    ports:
      - "6380:6379"
    networks:
      - minha_rede

  adminer:
    image: adminer
    container_name: adminer
    restart: unless-stopped
    ports:
      - "8081:8080"
    depends_on:
      - postgres
    networks:
      - minha_rede

#  ollama:
