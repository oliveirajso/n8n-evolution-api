services:
  cloudflared:
    image: cloudflare/cloudflared
    container_name: cloudflared
    command: tunnel run
    environment:
      - TUNNEL_TOKEN=${CLOUDFLARED_TUNNEL_TOKEN}
    networks:
      - minha_rede


  postgres:
    image: ankane/pgvector
    container_name: postgres
    restart: unless-stopped
    env_file:
      - .env
    volumes:
      - ./docker_data/postgres:/var/lib/postgresql/data
    networks:
      - minha_rede
  n8n:
    image: n8nio/n8n:2.9.1
    container_name: n8n
    restart: unless-stopped
    env_file:
      - .env
    volumes:
      - ./docker_data/n8n:/home/node/.n8n
    networks:
      - minha_rede

  evolution-api:
    container_name: evolution_api
    image: evoapicloud/evolution-api:v2.3.6
    restart: always
    volumes:
      - ./docker_data/evolution_instances:/lab_evolution/instances
    env_file:
      - .env
    networks:
      - minha_rede

  redis:
    image: redis:alpine
    container_name: redis
    restart: always
    #command: ["redis-server", "--appendonly", "yes", "--requirepass", "${REDIS_PASSWORD:-redis123}"] 
    ports:
      - "6380:6379"
    networks:
      - minha_rede
    healthcheck:
      #test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD:-redis123}", "ping"]
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

networks:
  minha_rede:
    driver: bridge
