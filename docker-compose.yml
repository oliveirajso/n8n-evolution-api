#    restart: unless-stopped
#    ports:
#      - "11434:11434"
#    volumes:
#      - ollama_data:/root/.ollama
#    networks:
#      - minha_rede

volumes:
  n8n_data:
  postgres_data:
  lab_evolution_instances:
  ollama_data:

networks:
  minha_rede:
    driver: bridge
