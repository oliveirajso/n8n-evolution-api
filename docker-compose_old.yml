  #     - ./.zrok:/home/ziggy/.zrok
  #   env_file:
  #     - .env
  #   command: share reserved ${ZROK_N8N_TOKEN}
  #   networks:
  #     - minha_rede

 # ZROK N8N
  zrok-n8n:
    image: openziti/zrok
    container_name: zrok_n8n
    depends_on:
      - n8n
    restart: unless-stopped
    volumes:
      - ./.zrok:/home/ziggy/.zrok
    command: share reserved http://n8n:5678 --token ${ZROK_N8N_TOKEN}
    networks:
      - minha_rede

  # ZROK EVOLUTION
  zrok-evolution:
    image: openziti/zrok
    container_name: zrok_evolution
    depends_on:
      - evolution-api
    restart: unless-stopped
    volumes:
      - ./.zrok:/home/ziggy/.zrok
    command: share reserved http://evolution-api:8080 --token ${ZROK_EVOLUTION_TOKEN}
    networks:
      - minha_rede

  redis:
    image: redis:alpine
    container_name: redis
    restart: always
    #command: ["redis-server", "--appendonly", "yes", "--requirepass", "${REDIS_PASSWORD:-redis123}"] 
    ports:
      - "6380:6379"
    networks:
      - minha_rede
    healthcheck:
      #test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD:-redis123}", "ping"]
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

