services:
  n8n:
    image: n8nio/n8n:2.9.1
    container_name: n8n
    restart: unless-stopped
    ports:
      - "5678:5678"
    env_file:
      - .env
    volumes:
      - ./docker_data/n8n:/home/node/.n8n
    networks:
      - minha_rede

  postgres:
    image: ankane/pgvector
    container_name: postgres
    restart: unless-stopped
    ports:
      - "5432:5432"
    env_file:
      - .env
    volumes:
      - ./docker_data/postgres:/var/lib/postgresql/data
    networks:
      - minha_rede

  proxy-evolution:
    image: vimagick/tinyproxy
    ports:
      - "8888:8888"
    volumes:
      - ./docker_data/tinyproxy:/etc/tinyproxy
    restart: unless-stopped



  evolution-api:
    container_name: evolution_api
    image: evoapicloud/evolution-api:v2.3.6
    restart: always
    ports:
      - 8080:8080
    volumes:
      - ./docker_data/evolution_instances:/lab_evolution/instances
    env_file:
      - .env
    networks:
      - minha_rede

  # zrok:
  #   image: openziti/zrok
  #   container_name: zrok
  #   restart: unless-stopped
  #   volumes:
  #     - ./.zrok:/home/ziggy/.zrok
  #   env_file:
  #     - .env
  #   command: enable ${ZROK_AUTHTOKEN}
  #   networks:
  #     - minha_rede
  # zrok:
